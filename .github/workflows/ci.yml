name: ci

# Thin caller for the reusable build.yml so the heavy installer + Azure signing
# logic lives in one place (shared with nexus-dev). PRs run the fast jobs as a
# merge gate; the installer jobs are opt-in via build_installer (dispatch only,
# including dispatch on a vX.Y.Z tag ref to publish a release).
on:
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version, e.g. 3.0.0-beta.3. Blank uses the committed nexus-service/VERSION.'
        type: string
        default: ''
      build_installer:
        description: 'Also build the installers (Windows .exe + Linux tarball)'
        type: boolean
        default: false
      prerelease:
        description: 'Mark the release as a prerelease (beta channel)'
        type: boolean
        default: false

jobs:
  build:
    permissions:
      contents: write
      id-token: write
    uses: ./.github/workflows/build.yml
    with:
      version: ${{ inputs.version || '' }}
      build_installer: ${{ inputs.build_installer || false }}
      prerelease: ${{ inputs.prerelease || false }}
    secrets: inherit
