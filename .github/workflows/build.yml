name: build

# Reusable pipeline called by this repo's ci.yml (public releases) and the
# private nexus-dev workspace repo (internal releases). Runs in the caller's
# context: the runners, GITHUB_TOKEN, github.ref, and the release-publish step
# all belong to the calling repo, so each side publishes to its own Releases.
on:
  workflow_call:
    inputs:
      version:
        description: 'Release version, e.g. 3.0.0-beta.3. Blank uses the committed nexus-service/VERSION.'
        type: string
        default: ''
      build_installer:
        description: 'Also build the installers (Windows .exe + Linux tarball)'
        type: boolean
        default: false
      prerelease:
        description: 'Mark the release as a prerelease (beta channel)'
        type: boolean
        default: false

# Force actions/* to run on Node 24 instead of the deprecated Node 20.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

permissions:
  contents: read

jobs:
  nexus-web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: nexus-web
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive
          token: ${{ secrets.SUBMODULES_TOKEN || secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: nexus-web/package-lock.json

      - run: npm ci

      - run: npm run lint

      - name: typecheck + build
        run: npm run build

      - name: unit tests
        run: npm test

  nexus-service:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: nexus-service
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive
          token: ${{ secrets.SUBMODULES_TOKEN || secrets.GITHUB_TOKEN }}

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - run: dotnet restore Nexus.slnx

      - name: build (non-Windows TFM)
        run: dotnet build Nexus.slnx --no-restore -c Release -p:BuildWeb=false

      # The full parallel suite intermittently deadlocks on the runner (a
      # known-flaky, threadpool-starvation stall across unrelated async tests -
      # passes on a re-run). --blame-hang-timeout aborts a wedged run in
      # minutes instead of sitting out the 6h job timeout, and the retry lets a
      # flaky roll recover; orphaned testhosts from an aborted attempt are
      # swept first so they cannot wedge the next one.
      - name: tests
        run: |
          set +e
          for attempt in 1 2 3; do
            echo "::group::test attempt $attempt"
            dotnet test Nexus.slnx --no-build -c Release -p:BuildWeb=false \
              --logger "console;verbosity=normal" \
              --blame-hang-timeout 6m --blame-hang-dump-type none
            code=$?
            echo "::endgroup::"
            if [ $code -eq 0 ]; then exit 0; fi
            echo "::warning::test attempt $attempt exited $code; sweeping testhosts and retrying"
            pkill -9 -f testhost 2>/dev/null || true
            pkill -9 -f "dotnet test" 2>/dev/null || true
            sleep 5
          done
          echo "::error::tests failed after 3 attempts"
          exit 1

  # Cross-build the minimal Windows ffmpeg on a macOS runner - the build
  # script's intended host (brew mingw-w64 with a writable sysroot). The Windows
  # installer job consumes it as an artifact, which keeps that job off the slow
  # macOS dmg/notarize job. Cached by the build script's contents.
  ffmpeg-win:
    runs-on: macos-latest
    if: ${{ inputs.build_installer }}
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive
          token: ${{ secrets.SUBMODULES_TOKEN || secrets.GITHUB_TOKEN }}
      - name: restore win-x64 ffmpeg cache
        id: cache
        uses: actions/cache@v6
        with:
          path: nexus-service/Bundled/win-x64/ffmpeg
          key: ffmpeg-win-x64-${{ hashFiles('nexus-service/scripts/build-ffmpeg-minimal.sh') }}
      - name: cross-build minimal ffmpeg (win-x64, cache miss)
        if: steps.cache.outputs.cache-hit != 'true'
        working-directory: nexus-service
        run: |
          brew install nasm mingw-w64 pkg-config
          bash scripts/build-ffmpeg-minimal.sh win
          mkdir -p Bundled/win-x64/ffmpeg
          cp build/ffmpeg/out/win-x64/ffmpeg.exe Bundled/win-x64/ffmpeg/
          cp build/ffmpeg/out/win-x64/LICENSE.txt Bundled/win-x64/ffmpeg/ 2>/dev/null || true
      - name: upload win-x64 ffmpeg
        uses: actions/upload-artifact@v7
        with:
          name: ffmpeg-win-x64
          path: nexus-service/Bundled/win-x64/ffmpeg
          retention-days: 1

  nexus-installer-windows:
    runs-on: windows-latest
    needs: [nexus-web, nexus-service, ffmpeg-win]
    # Opt-in only: skip the 2x Windows runner unless the installer was requested.
    if: ${{ inputs.build_installer }}
    env:
      # Pins both the `nuget install` and the -DlibPath folder below.
      TRUSTED_SIGNING_CLIENT_VERSION: '1.0.95'
    # The `release-signing` environment is what the Artifact Signing federated
    # credential trusts (subject repo:hello-nexus/nexus:environment:release-signing).
    # id-token: write lets azure/login mint the OIDC token for that exchange.
    environment: release-signing
    permissions:
      id-token: write
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive
          token: ${{ secrets.SUBMODULES_TOKEN || secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: nexus-web/package-lock.json

      - name: install nexus-web deps
        working-directory: nexus-web
        run: npm ci

      # OpenRGB headless bundle - required by EnsureOpenRgbBundle in the csproj.
      # openrgb-headless isn't wired as a real git submodule under nexus-rgb
      # (the workspace keeps it as a sibling clone), so 'submodules: recursive'
      # doesn't pull it. Clone it explicitly off the 'headless' branch tip.
      - name: clone openrgb-headless
        env:
          GIT_TOKEN: ${{ secrets.SUBMODULES_TOKEN }}
        shell: pwsh
        run: |
          git clone --depth 1 --branch headless `
            "https://x-access-token:$env:GIT_TOKEN@github.com/hello-nexus/openrgb-headless.git" `
            nexus-rgb/openrgb-headless

      # Cache the build keyed by the openrgb-headless commit SHA so we only
      # rebuild when that source actually changes.
      - name: resolve openrgb-headless SHA
        id: orgb-sha
        shell: pwsh
        run: |
          $sha = (git -C nexus-rgb/openrgb-headless rev-parse HEAD).Trim()
          "sha=$sha" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "openrgb-headless @ $sha"

      - name: restore OpenRGB bundle cache
        id: orgb-cache
        uses: actions/cache@v6
        with:
          path: nexus-service/Bundled/win-x64/openrgb
          key: openrgb-headless-win-x64-${{ steps.orgb-sha.outputs.sha }}

      - name: install Qt (cache miss)
        if: steps.orgb-cache.outputs.cache-hit != 'true'
        uses: jurplel/install-qt-action@48d3ad6db93f3627c8ee7a0454bc6f3744f7e730 # v4
        with:
          version: '5.15.2'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2019_64'
          modules: ''
          cache: true

      - name: set up MSVC (cache miss)
        if: steps.orgb-cache.outputs.cache-hit != 'true'
        uses: ilammy/msvc-dev-cmd@0b201ec74fa43914dc39ae48a89fd1d8cb592756 # v1
        with:
          arch: x64

      - name: install jom (cache miss)
        if: steps.orgb-cache.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri https://download.qt.io/official_releases/jom/jom_1_1_4.zip -OutFile jom.zip
          Expand-Archive -Path jom.zip -DestinationPath jom
          Add-Content -Path $env:GITHUB_PATH -Value "$pwd\jom"

      - name: build OpenRGB headless (cache miss)
        if: steps.orgb-cache.outputs.cache-hit != 'true'
        working-directory: nexus-rgb/openrgb-headless
        shell: cmd
        run: |
          qmake OpenRGB.pro CONFIG+=release
          jom -j %NUMBER_OF_PROCESSORS%

      - name: stage OpenRGB bundle (cache miss)
        if: steps.orgb-cache.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          $src = "nexus-rgb/openrgb-headless/release"
          $dst = "nexus-service/Bundled/win-x64/openrgb"
          New-Item -ItemType Directory -Force -Path $dst | Out-Null
          if (Test-Path "$src\OpenRGB.exe") {
            Move-Item "$src\OpenRGB.exe" "$src\OpenRGB-headless.exe"
          }
          Copy-Item "$src\OpenRGB-headless.exe" $dst
          Copy-Item "$src\*.dll" $dst -ErrorAction SilentlyContinue
          Copy-Item "nexus-rgb/openrgb-headless/LICENSE" "$dst\LICENSE-OpenRGB.txt"
          Get-ChildItem $dst | Format-Table Name, Length

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: stamp version (if provided)
        if: ${{ inputs.version != '' }}
        shell: pwsh
        env:
          VERSION_INPUT: ${{ inputs.version }}
        run: |
          [IO.File]::WriteAllText("nexus-service/VERSION", $env:VERSION_INPUT)
          Write-Host "VERSION -> $env:VERSION_INPUT"

      # ffmpeg (media import / screen mirror / beats) and NexusVCam.dll (Windows
      # virtual camera) are gitignored and built out-of-band, so CI must produce
      # them or the publish silently ships without them. ffmpeg is cross-built by
      # the ffmpeg-win job; the vcam DLL builds here (VS Build Tools + Win11 SDK
      # are on the runner). The csproj auto-detects the vcam build/Release output.
      - name: download win-x64 ffmpeg bundle
        uses: actions/download-artifact@v7
        with:
          name: ffmpeg-win-x64
          path: nexus-service/Bundled/win-x64/ffmpeg

      # Ninja + an explicit MSVC env (the OpenRGB job's proven pattern): CMake's
      # "Visual Studio 17 2022" generator can't locate VS on the runner, but
      # msvc-dev-cmd sets up cl.exe so the single-config Ninja build works. The
      # csproj auto-detects the build-ninja/NexusVCam.dll output.
      - name: set up MSVC (vcam build)
        uses: ilammy/msvc-dev-cmd@0b201ec74fa43914dc39ae48a89fd1d8cb592756 # v1
        with:
          arch: x64

      - name: build NexusVCam.dll (virtual camera)
        working-directory: nexus-service/Bundled/windows/nexus-vcam
        shell: cmd
        run: |
          cmake -G Ninja -DCMAKE_BUILD_TYPE=Release -B build-ninja
          cmake --build build-ninja

      - name: verify win-x64 bundles (ffmpeg + vcam)
        shell: pwsh
        run: |
          if (-not (Test-Path "nexus-service/Bundled/win-x64/ffmpeg/ffmpeg.exe")) { throw "ffmpeg.exe missing" }
          if (-not (Test-Path "nexus-service/Bundled/windows/nexus-vcam/build-ninja/NexusVCam.dll")) { throw "NexusVCam.dll missing" }
          Get-Item nexus-service/Bundled/win-x64/ffmpeg/ffmpeg.exe, nexus-service/Bundled/windows/nexus-vcam/build-ninja/NexusVCam.dll | Format-Table Name, Length

      - name: AOT publish (win-x64)
        working-directory: nexus-service
        run: dotnet publish Nexus.Service.csproj -c Release -r win-x64 -o publish

      # OIDC: no stored secret. The federated credential trusts this repo's
      # release-signing environment; the SP holds the Artifact Signing Certificate
      # Profile Signer role on the signing account.
      - name: Azure login (OIDC) for Artifact Signing
        uses: azure/login@2dd0bbf4064d5a1812889dc200bb8eed2597f82a # v3
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: install Inno Setup
        run: choco install innosetup --no-progress -y

      # The dlib ships in the Microsoft.Trusted.Signing.Client NuGet package;
      # signtool comes from the runner's Windows SDK (build-installer.ps1
      # auto-probes it). Auth is the ambient AzureCliCredential from the
      # azure/login step above. The signing identity (account/profile/endpoint)
      # comes from nexus-service/installer/signing-metadata.json - the old
      # SIGNING_* repo vars are no longer read by this workflow.
      - name: install Artifact Signing client (dlib)
        shell: pwsh
        run: nuget install Microsoft.Trusted.Signing.Client -Version ${{ env.TRUSTED_SIGNING_CLIENT_VERSION }} -OutputDirectory "${{ runner.temp }}\signing"

      # build-installer.ps1 -Sign signs the whole image Smart App Control
      # checks: every unsigned PE in the publish tree (bundled third-party
      # binaries included - SACVT validates each PE on the preinstall image
      # regardless of who launches it), the embedded uninstaller
      # (SignedUninstaller), and Nexus-Setup.exe itself before SHA256SUMS is
      # computed, so the published hash (and the OTA integrity check that
      # reads it) covers the signed bytes.
      - name: build installer (signed)
        working-directory: nexus-service
        run: powershell -File installer/build-installer.ps1 -PublishDir "${{ github.workspace }}\nexus-service\publish" -Sign -DlibPath "${{ runner.temp }}\signing\Microsoft.Trusted.Signing.Client.${{ env.TRUSTED_SIGNING_CLIENT_VERSION }}\bin\x64\Azure.CodeSigning.Dlib.dll"

      # Independent re-check of the script's internal gate: a future build
      # path that skips -Sign must fail here, not ship unsigned PEs. The one
      # PE this cannot see is the uninstaller embedded in Setup.exe - its
      # signing is guaranteed only by ISCC succeeding with SignedUninstaller.
      - name: verify signatures (Smart App Control gate)
        shell: pwsh
        run: |
          $bad = @(Get-ChildItem nexus-service/publish -Recurse -File -Force -Include *.exe, *.dll, *.sys |
            Where-Object { (Get-AuthenticodeSignature $_.FullName).Status -ne 'Valid' })
          $setup = "nexus-service/installer/output/Nexus-Setup.exe"
          if ((Get-AuthenticodeSignature $setup).Status -ne 'Valid') { $bad += Get-Item $setup }
          if ($bad.Count -gt 0) {
            $bad | ForEach-Object { Write-Host "UNSIGNED: $($_.FullName)" }
            throw "$($bad.Count) unsigned PE file(s)"
          }
          Write-Host "Smart App Control gate: publish tree + Nexus-Setup.exe fully signed."

      - name: upload installer artifact
        uses: actions/upload-artifact@v7
        with:
          name: Nexus-Setup-Windows
          path: nexus-service/installer/output/Nexus-Setup.exe
          retention-days: 7

      - name: publish release
        if: ${{ startsWith(github.ref, 'refs/tags/v') || inputs.version != '' }}
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION_INPUT: ${{ inputs.version }}
          PRERELEASE: ${{ inputs.prerelease }}
        shell: pwsh
        run: |
          $tag = if ($env:VERSION_INPUT -ne '') { "v$($env:VERSION_INPUT)" } else { $env:GITHUB_REF_NAME }
          gh release view $tag 2>$null
          if ($LASTEXITCODE -ne 0) {
            $a = @($tag, '--title', $tag, '--generate-notes', '--target', $env:GITHUB_SHA)
            if ($env:PRERELEASE -eq 'true') { $a += '--prerelease' }
            gh release create @a
          }
          # SHA256SUMS is required: the OTA auto-stage path refuses a release
          # whose hash it can't read from an author-published SHA256SUMS.
          gh release upload $tag nexus-service/installer/output/Nexus-Setup.exe nexus-service/installer/output/SHA256SUMS --clobber

  nexus-linux:
    runs-on: ubuntu-latest
    needs: [nexus-web, nexus-service]
    # Opt-in only (same gate as the Windows installer): builds OpenRGB headless +
    # AOT-publishes + packages the Linux tarball.
    if: ${{ inputs.build_installer }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive
          token: ${{ secrets.SUBMODULES_TOKEN || secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: nexus-web/package-lock.json

      - name: install nexus-web deps
        working-directory: nexus-web
        run: npm ci

      # OpenRGB headless bundle - required by EnsureOpenRgbBundle for linux-x64.
      # Not a real submodule (sibling clone); fetch the 'headless' branch tip.
      - name: clone openrgb-headless
        env:
          GIT_TOKEN: ${{ secrets.SUBMODULES_TOKEN }}
        run: |
          git clone --depth 1 --branch headless \
            "https://x-access-token:${GIT_TOKEN}@github.com/hello-nexus/openrgb-headless.git" \
            nexus-rgb/openrgb-headless

      - name: resolve openrgb-headless SHA
        id: orgb-sha
        run: echo "sha=$(git -C nexus-rgb/openrgb-headless rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: restore OpenRGB bundle cache
        id: orgb-cache
        uses: actions/cache@v6
        with:
          path: nexus-service/Bundled/linux-x64/openrgb
          key: openrgb-headless-linux-x64-${{ steps.orgb-sha.outputs.sha }}

      - name: install OpenRGB build deps (cache miss)
        if: steps.orgb-cache.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq qtbase5-dev libusb-1.0-0-dev libhidapi-dev \
            libmbedtls-dev libudev-dev libdbus-1-dev pkg-config build-essential patchelf

      - name: build OpenRGB headless (cache miss)
        if: steps.orgb-cache.outputs.cache-hit != 'true'
        working-directory: nexus-rgb/openrgb-headless
        run: |
          qmake OpenRGB.pro CONFIG+=release
          make -j"$(nproc)"

      - name: stage OpenRGB bundle (cache miss)
        if: steps.orgb-cache.outputs.cache-hit != 'true'
        run: |
          dst="nexus-service/Bundled/linux-x64/openrgb"
          mkdir -p "$dst"
          # qmake TARGET casing has drifted (OpenRGB -> openrgb); match it
          # case-insensitively so a rename on the headless branch doesn't break
          # this on the case-sensitive Linux FS (Windows is case-insensitive).
          src=$(find nexus-rgb/openrgb-headless -maxdepth 1 -type f -iname openrgb | head -1)
          [ -n "$src" ] || { echo "OpenRGB headless binary not found after build:"; ls -la nexus-rgb/openrgb-headless; exit 1; }
          cp "$src" "$dst/openrgb-headless"
          cp nexus-rgb/openrgb-headless/LICENSE "$dst/LICENSE-OpenRGB.txt" || true
          chmod +x "$dst/openrgb-headless"
          # This is the HEADLESS build - it must not link Qt. Fail loudly if it does.
          if ldd "$dst/openrgb-headless" | grep -qi 'libqt'; then
            echo "ERROR: openrgb-headless links Qt; expected a no-Qt headless build"; exit 1
          fi
          # Bundle the non-standard runtime dep (mbedTLS, present in the build
          # image but not on e.g. Fedora) next to the binary, and set
          # rpath=$ORIGIN so it loads regardless of the host's system libs.
          for soname in $(ldd "$dst/openrgb-headless" | awk '/libmbed/ {print $1}'); do
            real=$(ldd "$dst/openrgb-headless" | awk -v s="$soname" '$1==s {print $3}')
            [ -n "$real" ] && cp -L "$real" "$dst/$soname"
          done
          patchelf --set-rpath '$ORIGIN' "$dst/openrgb-headless"
          echo "rpath: $(patchelf --print-rpath "$dst/openrgb-headless")"
          ls -la "$dst"

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      # NativeAOT needs a C toolchain + zlib for the link step.
      - name: install AOT toolchain
        run: sudo apt-get install -y -qq clang lld zlib1g-dev

      - name: stamp version (if provided)
        if: ${{ inputs.version != '' }}
        env:
          VERSION_INPUT: ${{ inputs.version }}
        run: |
          if [ -n "$VERSION_INPUT" ]; then printf '%s' "$VERSION_INPUT" > nexus-service/VERSION; echo "VERSION -> $VERSION_INPUT"; fi

      - name: restore ffmpeg bundle cache (linux-x64)
        id: ffmpeg-cache
        uses: actions/cache@v6
        with:
          path: nexus-service/Bundled/linux-x64/ffmpeg
          key: ffmpeg-linux-x64-${{ hashFiles('nexus-service/scripts/build-ffmpeg-minimal.sh') }}

      - name: build minimal ffmpeg (linux-x64, cache miss)
        if: steps.ffmpeg-cache.outputs.cache-hit != 'true'
        working-directory: nexus-service
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq nasm libx264-dev libpulse-dev zlib1g-dev libbz2-dev pkg-config
          bash scripts/build-ffmpeg-minimal.sh linux
          mkdir -p Bundled/linux-x64/ffmpeg
          cp build/ffmpeg/out/linux-x64/ffmpeg Bundled/linux-x64/ffmpeg/
          cp build/ffmpeg/out/linux-x64/LICENSE.txt Bundled/linux-x64/ffmpeg/ 2>/dev/null || true
          chmod +x Bundled/linux-x64/ffmpeg/ffmpeg

      - name: AOT publish (linux-x64)
        working-directory: nexus-service
        run: dotnet publish Nexus.Service.csproj -c Release -r linux-x64 -o publish

      - name: package tarball
        working-directory: nexus-service
        run: bash installer/linux/package.sh "$PWD/publish" "$PWD/installer/output"

      - name: upload tarball artifact
        uses: actions/upload-artifact@v7
        with:
          name: Nexus-Linux-x64
          path: nexus-service/installer/output/Nexus-Linux-x64.tar.gz
          retention-days: 7

      - name: publish release
        if: ${{ startsWith(github.ref, 'refs/tags/v') || inputs.version != '' }}
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION_INPUT: ${{ inputs.version }}
          PRERELEASE: ${{ inputs.prerelease }}
        run: |
          if [ -n "$VERSION_INPUT" ]; then tag="v$VERSION_INPUT"; else tag="$GITHUB_REF_NAME"; fi
          pre=""
          [ "$PRERELEASE" = "true" ] && pre="--prerelease"
          gh release view "$tag" >/dev/null 2>&1 \
            || gh release create "$tag" --title "$tag" --generate-notes --target "$GITHUB_SHA" $pre
          gh release upload "$tag" nexus-service/installer/output/Nexus-Linux-x64.tar.gz --clobber

  nexus-macos:
    # Pinned off macos-latest: it moved to macos-26 (Xcode 26 / ld-1267),
    # whose linker fails the osx-arm64 NativeAOT link both ways - the default
    # ld-prime asserts "too many large addends" (dotnet/runtime#119380) and
    # the -ld_classic workaround hits its own "dylibToOrdinal" assertion. The
    # last green dmg (v3.0.4-beta.7) built on macos-15, whose older ld links
    # the AOT binary; -ld_classic (Nexus.Service.csproj) still forces the
    # classic linker there to stay clear of the large-addends bug.
    runs-on: macos-15
    needs: [nexus-web, nexus-service]
    # Opt-in only (same gate as the Windows/Linux installers). Builds the
    # osx-arm64 AOT app, signs it Developer ID + hardened runtime, notarizes,
    # staples, and packages Nexus.dmg. The camera system extension is omitted
    # (NEXUS_SKIP_CAMERA_EXTENSION) because CI can't provision it headlessly.
    if: ${{ inputs.build_installer }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive
          token: ${{ secrets.SUBMODULES_TOKEN || secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: nexus-web/package-lock.json

      - name: build web
        working-directory: nexus-web
        run: |
          npm ci
          npm run build:service

      # OpenRGB headless bundle (osx-arm64). Sibling clone, like the other jobs.
      - name: clone openrgb-headless
        env:
          GIT_TOKEN: ${{ secrets.SUBMODULES_TOKEN }}
        run: |
          git clone --depth 1 --branch headless \
            "https://x-access-token:${GIT_TOKEN}@github.com/hello-nexus/openrgb-headless.git" \
            nexus-rgb/openrgb-headless

      - name: resolve openrgb-headless SHA
        id: orgb-sha
        run: echo "sha=$(git -C nexus-rgb/openrgb-headless rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: restore OpenRGB bundle cache
        id: orgb-cache
        uses: actions/cache@v6
        with:
          path: nexus-service/Bundled/osx-arm64/openrgb
          key: openrgb-headless-osx-arm64-${{ steps.orgb-sha.outputs.sha }}

      - name: build + bundle OpenRGB (cache miss)
        if: steps.orgb-cache.outputs.cache-hit != 'true'
        run: |
          # OpenRGB.pro resolves mbedtls@3 (NOT the `mbedtls` formula), hidapi,
          # and libusb via `brew --prefix` + Homebrew's include path.
          brew install qt@5 hidapi libusb mbedtls@3 pkg-config
          export PATH="$(brew --prefix qt@5)/bin:$PATH"
          ( cd nexus-rgb/openrgb-headless && qmake OpenRGB.pro CONFIG+=release CONFIG+=sdk_no_version_check && make -j"$(sysctl -n hw.ncpu)" )
          bash nexus-rgb/bundle-macos.sh "$PWD/nexus-service/Bundled/osx-arm64/openrgb"
          file nexus-service/Bundled/osx-arm64/openrgb/OpenRGB-headless | grep -q arm64 \
            || { echo "OpenRGB headless is not arm64"; exit 1; }

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: stamp version (if provided)
        if: ${{ inputs.version != '' }}
        env:
          VERSION_INPUT: ${{ inputs.version }}
        run: |
          if [ -n "$VERSION_INPUT" ]; then printf '%s' "$VERSION_INPUT" > nexus-service/VERSION; echo "VERSION -> $VERSION_INPUT"; fi

      - name: restore ffmpeg bundle cache (osx-arm64)
        id: ffmpeg-cache
        uses: actions/cache@v6
        with:
          path: nexus-service/Bundled/osx-arm64/ffmpeg
          key: ffmpeg-osx-arm64-${{ hashFiles('nexus-service/scripts/build-ffmpeg-minimal.sh') }}

      - name: build minimal ffmpeg (osx-arm64, cache miss)
        if: steps.ffmpeg-cache.outputs.cache-hit != 'true'
        working-directory: nexus-service
        run: |
          brew install nasm x264 pkg-config
          bash scripts/build-ffmpeg-minimal.sh mac
          mkdir -p Bundled/osx-arm64/ffmpeg
          cp build/ffmpeg/out/osx-arm64/ffmpeg Bundled/osx-arm64/ffmpeg/
          cp build/ffmpeg/out/osx-arm64/LICENSE.txt Bundled/osx-arm64/ffmpeg/ 2>/dev/null || true
          chmod +x Bundled/osx-arm64/ffmpeg/ffmpeg

      - name: AOT publish (osx-arm64, no camera extension)
        working-directory: nexus-service
        env:
          NEXUS_SKIP_CAMERA_EXTENSION: '1'
        run: |
          dotnet publish Nexus.Service.csproj -c Release -r osx-arm64 -p:BuildWeb=false -o publish
          test -d Nexus.app || { echo "Nexus.app not assembled"; exit 1; }

      - name: populate wwwroot
        working-directory: nexus-service
        run: |
          cp -R ../nexus-web/dist/. Nexus.app/Contents/MacOS/wwwroot/
          test -f Nexus.app/Contents/MacOS/wwwroot/index.html

      - name: import Developer ID signing cert
        env:
          CERT_P12: ${{ secrets.APPLE_DEVID_CERT_P12 }}
          CERT_PW: ${{ secrets.APPLE_DEVID_CERT_PASSWORD }}
        run: |
          KCPW="$(uuidgen)"
          KEYCHAIN="$RUNNER_TEMP/build.keychain-db"
          echo "$CERT_P12" | base64 --decode > "$RUNNER_TEMP/devid.p12"
          security create-keychain -p "$KCPW" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KCPW" "$KEYCHAIN"
          security import "$RUNNER_TEMP/devid.p12" -P "$CERT_PW" -A -t cert -f pkcs12 -k "$KEYCHAIN"
          security list-keychains -d user -s "$KEYCHAIN" "$(security default-keychain -d user | tr -d ' \"')"
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KCPW" "$KEYCHAIN" >/dev/null
          rm -f "$RUNNER_TEMP/devid.p12"
          security find-identity -v -p codesigning "$KEYCHAIN"

      - name: sign + notarize + package dmg
        working-directory: nexus-service
        env:
          MAC_SIGN_IDENTITY: ${{ vars.APPLE_SIGN_IDENTITY }}
          MAC_NOTARY_APPLE_ID: ${{ vars.APPLE_NOTARY_APPLE_ID }}
          MAC_NOTARY_PASSWORD: ${{ secrets.APPLE_NOTARY_PASSWORD }}
          MAC_TEAM_ID: ${{ vars.APPLE_TEAM_ID }}
        run: |
          mkdir -p installer/output
          bash Bundled/macos/sign-notarize.sh "$PWD/Nexus.app" "$PWD/installer/output/Nexus.dmg"

      - name: upload dmg artifact
        uses: actions/upload-artifact@v7
        with:
          name: Nexus-macOS
          path: nexus-service/installer/output/Nexus.dmg
          retention-days: 7

      - name: publish release (tag or version input)
        if: ${{ startsWith(github.ref, 'refs/tags/v') || inputs.version != '' }}
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION_INPUT: ${{ inputs.version }}
          PRERELEASE: ${{ inputs.prerelease }}
        run: |
          if [ -n "$VERSION_INPUT" ]; then tag="v$VERSION_INPUT"; else tag="$GITHUB_REF_NAME"; fi
          pre=""
          [ "$PRERELEASE" = "true" ] && pre="--prerelease"
          gh release view "$tag" >/dev/null 2>&1 \
            || gh release create "$tag" --title "$tag" --generate-notes --target "$GITHUB_SHA" $pre
          gh release upload "$tag" nexus-service/installer/output/Nexus.dmg --clobber

  # Rewrite the release body from the submodule commits (the per-repo changes),
  # skipping the umbrella's own bump/CI commits. Runs after the build jobs have
  # created the release; on failure the release keeps the --generate-notes body.
  release-notes:
    needs: [nexus-installer-windows, nexus-linux, nexus-macos]
    if: ${{ !cancelled() && (startsWith(github.ref, 'refs/tags/v') || inputs.version != '') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive
          fetch-depth: 0
          token: ${{ secrets.SUBMODULES_TOKEN || secrets.GITHUB_TOKEN }}
      - name: compose notes from submodule commits
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION_INPUT: ${{ inputs.version }}
        run: |
          set -uo pipefail
          if [ -n "$VERSION_INPUT" ]; then tag="v$VERSION_INPUT"; else tag="$GITHUB_REF_NAME"; fi
          prev=$(git tag -l 'v*' --sort=-v:refname | awk -v cur="$tag" 'f{print;exit} $0==cur{f=1}')
          echo "tag=$tag prev=${prev:-<none>}"
          : > body.md
          while read -r path; do
            new=$(git ls-tree HEAD "$path" 2>/dev/null | awk '{print $3}')
            [ -n "$new" ] || continue
            old=""
            [ -n "$prev" ] && old=$(git ls-tree "$prev" "$path" 2>/dev/null | awk '{print $3}')
            [ "$old" = "$new" ] && continue
            name=$(basename "$path")
            if ! { [ -n "$old" ] && git -C "$path" cat-file -e "${old}^{commit}" 2>/dev/null \
                   && git -C "$path" cat-file -e "${new}^{commit}" 2>/dev/null; }; then
              git -C "$path" fetch -q --unshallow 2>/dev/null || git -C "$path" fetch -q 2>/dev/null || true
            fi
            if [ -n "$old" ] && git -C "$path" cat-file -e "${old}^{commit}" 2>/dev/null \
               && git -C "$path" cat-file -e "${new}^{commit}" 2>/dev/null; then
              log=$(git -C "$path" log --no-merges --pretty='- %s' "${old}..${new}")
            elif [ -z "$old" ]; then
              log="- added"
            else
              log="- updated"
            fi
            [ -n "$log" ] || continue
            { echo "### ${name}"; printf '%s\n\n' "$log"; } >> body.md
          done < <(git config -f .gitmodules --get-regexp path | awk '{print $2}')
          [ -s body.md ] || printf '_No submodule changes since %s._\n\n' "${prev:-the previous release}" >> body.md
          [ -n "$prev" ] && printf '**Full Changelog**: %s/%s/compare/%s...%s\n' \
            "$GITHUB_SERVER_URL" "$GITHUB_REPOSITORY" "$prev" "$tag" >> body.md
          echo "----- body.md -----"; cat body.md
          gh release edit "$tag" --notes-file body.md || echo "release edit skipped (no release?)"

      # Announce in Discord. A release created here is authored by GITHUB_TOKEN,
      # and GitHub suppresses the 'release: published' event for token-created
      # releases - so the standalone discord-release.yml never fires for a CI
      # release. Post directly from this job instead (it runs last, after assets
      # + composed notes). Manual human releases still go via discord-release.yml.
      - name: announce in Discord
        env:
          GH_TOKEN: ${{ github.token }}
          WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
          VERSION_INPUT: ${{ inputs.version }}
          PRERELEASE: ${{ inputs.prerelease }}
        run: |
          set -uo pipefail
          if [ -z "${WEBHOOK:-}" ]; then echo "no DISCORD_WEBHOOK_URL; skipping"; exit 0; fi
          if [ -n "$VERSION_INPUT" ]; then tag="v$VERSION_INPUT"; else tag="$GITHUB_REF_NAME"; fi
          # The job runs on !cancelled(), i.e. even when an installer job failed.
          # Only announce a release that was actually published.
          gh release view "$tag" >/dev/null 2>&1 || { echo "no published release for $tag; skipping"; exit 0; }
          url="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/releases/tag/$tag"
          body=$(cat body.md 2>/dev/null || echo "")
          if [ "${PRERELEASE}" = "true" ]; then
            title="🧪 Nexus ${tag} (beta) is out"; color=16763904
          else
            title="🚀 Nexus ${tag} is out"; color=5793266
          fi
          # Truncate inside jq (code-point safe) to Discord's 4096-char embed limit.
          payload=$(jq -n --arg title "$title" --arg url "$url" --arg body "$body" --argjson color "$color" \
            '($body | if (length > 3900)
                      then .[0:3900] + "\n\n… [read the full notes](" + $url + ")"
                      else . end) as $desc
             | { embeds: [ { title: $title, url: $url, description: $desc, color: $color } ] }')
          post() { curl -sS -o /tmp/discord-resp -w '%{http_code}' \
            -H 'Content-Type: application/json' -X POST "$WEBHOOK" -d "$payload"; }
          code=$(post)
          # One retry on a rate-limit (honor retry_after) or transient 5xx/curl error.
          case "$code" in
            429) wait=$(jq -r '.retry_after // 2' /tmp/discord-resp 2>/dev/null || echo 2)
                 sleep "$(printf '%.0f' "$wait" 2>/dev/null || echo 2)"; code=$(post) ;;
            5*|000) sleep 3; code=$(post) ;;
          esac
          echo "discord responded $code"
          [ "$code" = "204" ] || [ "$code" = "200" ] || { echo "::warning::discord post failed ($code)"; cat /tmp/discord-resp; }
